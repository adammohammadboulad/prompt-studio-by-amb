  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"14fb0fe2-5098-4e8e-8ca1-794e442eeac5\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  html,body{margin:0;padding:0}\n  doc-page:not(:defined){visibility:hidden}\n<\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"doc-page\" from=\"c2da3a29-e294-46c5-a59b-850e861210ff#/doc-page.js\" size=\"letter\" margin=\"0.8in\" hint-size=\"100%,1400px\">\n<div style=\"font-family:Charter,Georgia,serif;color:#1f1d1a;font-size:14.5px;line-height:1.65\" data-screen-label=\"User Guide\">\n\n  <h1 style=\"font-family:system-ui,sans-serif;font-size:30px;letter-spacing:-0.02em;margin:0 0 4px;color:#1f1d1a\">Markdown Prompt Studio — User Guide<\u002Fh1>\n  <p style=\"margin:0 0 22px;color:#6f685c;font-size:15px\">A complete reference for the app: what each tab does, every feature, the inline-option syntax, and the full text of every built-in prompt, mode, persona and structure.<\u002Fp>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:26px 0 8px;color:#0F766E\">1 · What the app is<\u002Fh2>\n  <p style=\"margin:0 0 10px\">Markdown Prompt Studio is a workbench for writing, templating and reusing LLM prompts as markdown documents. It has three tabs:<\u002Fp>\n  <ul style=\"margin:0 0 10px;padding-left:22px\">\n    <li style=\"margin-bottom:5px\"><strong>Markdown Viewer<\u002Fstrong> — renders a markdown prompt with inline option selectors and per-block checkboxes, so you can configure a prompt and copy exactly the parts you want.<\u002Fli>\n    <li style=\"margin-bottom:5px\"><strong>Prompt Wizard<\u002Fstrong> — a step-by-step builder: AI proposes a section structure from your idea, then writes each section one at a time under your control.<\u002Fli>\n    <li style=\"margin-bottom:5px\"><strong>Enrich Prompt<\u002Fstrong> — one-shot transformation: a rough prompt in, a structured, option-templated prompt out.<\u002Fli>\n  <\u002Ful>\n  <p style=\"margin:0 0 10px\">Everything is stored only in your browser (localStorage): saved prompts, AI settings per provider, customizations, and wizard progress. Your API key never leaves the device except to call the provider directly.<\u002Fp>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:26px 0 8px;color:#0F766E\">2 · The inline option syntax<\u002Fh2>\n  <p style=\"margin:0 0 8px\">Options are the core mechanic. Anywhere in your markdown, write:<\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;margin:0 0 10px\">[option name](ph:choice 1|choice 2|choice 3)<\u002Fpre>\n  <ul style=\"margin:0 0 10px;padding-left:22px\">\n    <li style=\"margin-bottom:4px\">In View mode it renders as an inline dropdown selector; the <strong>first choice is the default<\u002Fstrong>.<\u002Fli>\n    <li style=\"margin-bottom:4px\">Reusing the <strong>same option name<\u002Fstrong> marks the same concept in multiple places (e.g. <code style=\"background:#f0ede7;border-radius:4px;padding:1px 5px;font-size:0.9em\">[tone](ph:professional|casual)<\u002Fcode> in three paragraphs). Each occurrence keeps its own selection, but they are grouped together in the Options panel.<\u002Fli>\n    <li style=\"margin-bottom:4px\">Options work inside headings, bullets, quotes, and table cells. Pipes inside the parentheses do not break tables.<\u002Fli>\n    <li style=\"margin-bottom:4px\">When you press <strong>Copy Selected<\u002Fstrong>, each option is replaced by its currently selected choice (plain text). Only the Wizard's review step keeps the raw option syntax when assembling.<\u002Fli>\n  <\u002Ful>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:26px 0 8px;color:#0F766E\">3 · Markdown Viewer tab<\u002Fh2>\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">Edit / View modes<\u002Fh3>\n  <p style=\"margin:0 0 10px\"><strong>Edit<\u002Fstrong> is a plain monospace editor for the raw markdown. <strong>View<\u002Fstrong> renders it: headings, bullets, numbered lists, tables, code blocks, quotes, horizontal rules, links, bold/italic and inline code are supported.<\u002Fp>\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">Selecting what gets copied<\u002Fh3>\n  <ul style=\"margin:0 0 10px;padding-left:22px\">\n    <li style=\"margin-bottom:4px\">Every block has a checkbox. <strong>Unchecking a block excludes it<\u002Fstrong> (dimmed at 35% opacity) from Copy Selected.<\u002Fli>\n    <li style=\"margin-bottom:4px\">Unchecking a heading excludes its whole subtree. Headings H1–H3 have checkboxes and collapse chevrons.<\u002Fli>\n    <li style=\"margin-bottom:4px\">Tables have per-row <em>and<\u002Fem> per-column checkboxes; excluded rows/columns are removed from the copied table.<\u002Fli>\n    <li style=\"margin-bottom:4px\">Numbered lists are automatically <strong>renumbered<\u002Fstrong> in both the view and the copied output when items are excluded.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>⧉ Copy Selected<\u002Fstrong> (top bar) builds the final markdown: excluded blocks dropped, options substituted with their selected values, blank lines normalized.<\u002Fli>\n  <\u002Ful>\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">Outline &amp; Options panel (right, resizable)<\u002Fh3>\n  <ul style=\"margin:0 0 10px;padding-left:22px\">\n    <li style=\"margin-bottom:4px\"><strong>Outline<\u002Fstrong> — H1–H3 headings with collapse chevrons and include-checkboxes; click a heading to scroll to it. The current section is highlighted as you scroll.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>Options<\u002Fstrong> — all option groups by name with an occurrence count. Expand a group to see each occurrence (\"in <em>Section<\u002Fem>\"), jump to it, or change its value from here. Buttons: <strong>✎ rename<\u002Fstrong> (renames every occurrence), <strong>⋯ edit choices<\u002Fstrong> (replaces the choice list everywhere), <strong>+ add<\u002Fstrong> a new option (appended to the document), 🗑 delete is blocked while the option is still used.<\u002Fli>\n    <li style=\"margin-bottom:4px\">Drag the divider to resize; the header arrows collapse either side panel.<\u002Fli>\n  <\u002Ful>\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">Prompt library, import, export<\u002Fh3>\n  <ul style=\"margin:0 0 10px;padding-left:22px\">\n    <li style=\"margin-bottom:4px\"><strong>Load prompt…<\u002Fstrong> dropdown — saved prompts plus a built-in ★ Sample markdown.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>💾 Save<\u002Fstrong> names and stores the current document; 🗑 deletes the loaded one.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>⤒ Open<\u002Fstrong> imports a local .md/.txt file; <strong>⤓ Export<\u002Fstrong> downloads the current document as .md.<\u002Fli>\n    <li style=\"margin-bottom:4px\">Anything that would be replaced (loading, generating, wizard hand-off) is first <strong>auto-stashed<\u002Fstrong> to the library as \"Backup (unsaved)\" so work is never lost.<\u002Fli>\n  <\u002Ful>\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">✦ Detect Options<\u002Fh3>\n  <p style=\"margin:0 0 10px\">Sends your whole markdown to the configured AI with the <em>Detect Options system prompt<\u002Fem> (§7.1). The model wraps genuine authoring knobs — tone, audience, length, format — in option syntax and returns the document otherwise unchanged. If a document has no options, a one-time popup explains the syntax and offers this button.<\u002Fp>\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">Aa Customize<\u002Fh3>\n  <p style=\"margin:0 0 10px\">Popover with: <strong>Theme<\u002Fstrong> (light/dark) · <strong>Accent color<\u002Fstrong> (6 swatches) · <strong>Selector style<\u002Fstrong> (pill / underline / boxed / plain) · <strong>Font size<\u002Fstrong> (S/M/L) · <strong>Layout<\u002Fstrong> (comfortable/compact) · <strong>Content font<\u002Fstrong> (serif / sans / Atkinson Hyperlegible / Lexend).<\u002Fp>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:26px 0 8px;color:#0F766E\">4 · AI Settings (left sidebar, all tabs)<\u002Fh2>\n  <ul style=\"margin:0 0 10px;padding-left:22px\">\n    <li style=\"margin-bottom:4px\"><strong>Provider<\u002Fstrong> — OpenAI, Claude (Anthropic), Local (Ollama), or Custom (any OpenAI-compatible endpoint). Settings are saved separately per provider.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>Model<\u002Fstrong> — curated list per provider (e.g. gpt-5.5, claude-sonnet-5, llama3.1) plus a Custom… free-text field.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>API Key / Base URL<\u002Fstrong> — key stored locally; base URL editable for proxies or local servers.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>Temperature<\u002Fstrong> (0–2, checkbox to omit it from requests) and <strong>Max tokens<\u002Fstrong> (checkbox to omit). For non-Claude providers a <strong>Token parameter<\u002Fstrong> switch chooses <code style=\"background:#f0ede7;border-radius:4px;padding:1px 5px;font-size:0.9em\">max_tokens<\u002Fcode> vs <code style=\"background:#f0ede7;border-radius:4px;padding:1px 5px;font-size:0.9em\">max_completion_tokens<\u002Fcode>; if a model rejects one, the app retries with the other and remembers it.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>System Prompt<\u002Fstrong> box: on the Viewer tab it edits the Detect Options prompt; on the Enrich tab it edits the Enrich system prompt; the Wizard has none here — each wizard step carries its own, editable on the step.<\u002Fli>\n  <\u002Ful>\n  <p style=\"margin:0 0 10px\">Every AI call logs its full system + user prompt to the browser console, so you can inspect exactly what was sent.<\u002Fp>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:26px 0 8px;color:#0F766E\">5 · Prompt Wizard tab<\u002Fh2>\n  <p style=\"margin:0 0 8px\">A pipeline of steps shown as a progress bar: <strong>① Structure → ② one step per section → ③ Review<\u002Fstrong>. Completed steps get a ✓; click any pill to jump.<\u002Fp>\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">Step 1 — Structure<\u002Fh3>\n  <ul style=\"margin:0 0 10px;padding-left:22px\">\n    <li style=\"margin-bottom:4px\"><strong>Initial Input<\u002Fstrong> — your idea or rough prompt.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>Persona<\u002Fstrong> and <strong>Structure<\u002Fstrong> pickers (shared library, §8–9), each with its instruction text visible and editable. Edits can be saved back as the default or reset; you can Add / Rename / Delete entries.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>✦ Generate Structure<\u002Fstrong> sends <em>Step system prompt + STRUCTURE + PERSONA<\u002Fem>; the model returns 4–8 <code style=\"background:#f0ede7;border-radius:4px;padding:1px 5px;font-size:0.9em\">## Section<\u002Fcode> headings (each with a one-line description, optionally <code style=\"background:#f0ede7;border-radius:4px;padding:1px 5px;font-size:0.9em\">### Subsections<\u002Fcode>).<\u002Fli>\n    <li style=\"margin-bottom:4px\">Result appears in a <strong>Tree<\u002Fstrong> (check/uncheck to include, rename ✎, reorder ↑↓) or editable <strong>Raw<\u002Fstrong> markdown view; the two stay in sync, and sections keeping their title keep any generated content. Regenerating warns before discarding content.<\u002Fli>\n    <li style=\"margin-bottom:4px\">Each checked section becomes its own wizard step.<\u002Fli>\n  <\u002Ful>\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">Section steps<\u002Fh3>\n  <ul style=\"margin:0 0 10px;padding-left:22px\">\n    <li style=\"margin-bottom:4px\">Per section you set: <strong>Persona<\u002Fstrong> (overrides the wizard default for this section only), <strong>Length/Depth<\u002Fstrong> (Concise / Standard / Detailed, §7.5), and optional <strong>Extra instructions / context<\u002Fstrong>.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>✦ Generate Section<\u002Fstrong> sends the Section-content system prompt (§7.4) + persona, with a user message containing the original idea, the full outline (context only), the section brief, and the length. The model writes only that section.<\u002Fli>\n    <li style=\"margin-bottom:4px\">Output shows in a mini viewer with the same per-block checkboxes and inline option selectors; an <strong>Edit<\u002Fstrong> toggle lets you hand-edit the markdown (edits are kept). <strong>Copy Selected<\u002Fstrong> copies just this section.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>Regenerate with feedback<\u002Fstrong> — type what should change; the previous version + your feedback are sent for revision.<\u002Fli>\n  <\u002Ful>\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">Review step<\u002Fh3>\n  <p style=\"margin:0 0 10px\">Assembles all included sections in order (unchecked blocks left out, option syntax kept), flags any not-yet-generated sections, and offers <strong>Copy<\u002Fstrong> or <strong>Open in Markdown Viewer →<\u002Fstrong> which hands the assembled prompt to the Viewer.<\u002Fp>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:26px 0 8px;color:#0F766E\">6 · Enrich Prompt tab<\u002Fh2>\n  <p style=\"margin:0 0 8px\">One-shot: type a rough prompt, pick a <strong>Mode<\u002Fstrong>, <strong>Persona<\u002Fstrong> and <strong>Structure<\u002Fstrong> (every instruction text visible and editable, with Save/Reset), press <strong>✦ Generate<\u002Fstrong>. The final system prompt is assembled as:<\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;margin:0 0 10px\">Enrich system prompt\n+ STRUCTURE: (structure instruction)\n+ PERSONA / PERSPECTIVE: (persona instruction, or neutral fallback)\n+ MODE instruction<\u002Fpre>\n  <p style=\"margin:0 0 10px\">The result opens directly in the Markdown Viewer, ready with inline options. The Structure card also shows a live section tree parsed from the \"- Section\" bullets of the structure instruction.<\u002Fp>\n  <p style=\"margin:0 0 10px\">The three modes: <strong>Enhance<\u002Fstrong> — clarify and restructure without changing scope; <strong>Expand<\u002Fstrong> — go exactly one level deeper, making the implicit explicit; <strong>Plan<\u002Fstrong> — turn the prompt into an ordered execution plan (plan the work, don't do it). Full texts in §7.3.<\u002Fp>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:30px 0 8px;color:#0F766E\">7 · Full built-in prompt texts<\u002Fh2>\n\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">7.1 Detect Options — system prompt (Viewer)<\u002Fh3>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 14px\"># Task Description\nYour task is to analyze the input markdown prompt, identify the places where an option, configuration, decision, or knob is present, and template them using inline option syntax — without changing anything else.\n\n# Task Steps\nDo the following, in order:\n1. Analyze the input prompt and understand what it is for and which values the author would plausibly want to switch between runs.\n2. Identify every part that is genuinely an option, configuration, decision, or knob — e.g. tone, audience, length or detail level, output format or channel, language, point of view, or interchangeable technology/deployment choices the prompt treats as open.\n4. For each identified option, keep the current value as the default: place the original text verbatim as the FIRST choice, then add 1–4 further choices that are realistic, distinct, and mutually exclusive — not synonyms.\n5. Wrap each one in exactly this format, inline where the value sits: [option name](ph:current value|alternative 1|alternative 2)\n6. Reuse the exact same option name wherever the same concept appears, so occurrences group together. Keep option names short English noun phrases, even in Arabic documents.\n8. Don't change the text beside formatting the options.\n\nReturn ONLY the resulting markdown — no explanations, no commentary, no code fences.\n\n# How to format options\n[option name](ph:default or current value|alternative 1|alternative 2)<\u002Fpre>\n\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">7.2 Enrich — system prompt<\u002Fh3>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 14px\">You are an expert prompt engineer. Rewrite the user's rough prompt into a clear, well-structured, reusable markdown prompt that another LLM can follow with minimal ambiguity.\n\nFollow the STRUCTURE, PERSONA and MODE instructions below. Be specific and actionable; cut filler, restatements, and generic advice. Never invent facts — prefer explicit assumptions and inline options over pretending unknown details are known.\n\nOUTPUT FORMAT (STRICT):\nReturn ONLY a markdown document. No commentary before or after it, and no code fence around the whole output.\n- Use #, ## and ### headings for sections. Use \"- \" bullets or \"1. \" numbered steps for enumerable content.\n- Turn variable or decision-like values into inline options using exactly this syntax: [option name](ph:choice 1|choice 2|choice 3)\n  - The FIRST choice is the default. Give 2-5 distinct, realistic choices. Reuse the exact same option name for the same concept everywhere it appears.\n- Put options inline exactly where the value belongs; never list them in a separate section. If a value has no real alternatives, write it as plain text.<\u002Fpre>\n\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">7.3 Enrich — mode instructions<\u002Fh3>\n  <p style=\"margin:0 0 6px\"><strong>Enhance<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">MODE = ENHANCE. Improve the clarity, precision, and structure of the user's prompt without changing its scope. Resolve ambiguity, tighten wording, and reorganize the content into clean, logical, self-contained sections. Do NOT add a new layer of depth, invent requirements, or introduce details the prompt does not already imply. Preserve the original intent and stay at the same conceptual level.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Expand<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">MODE = EXPAND. Take the prompt exactly one level deeper. Make implicit aspects explicit and add the reasonable, high-level detail a knowledgeable practitioner would expect — e.g. an application idea expands into features, constraints, platform, interface, and data, each under its own heading. Add depth through sensible defaults and inline options, not low-level implementation. Mark anything uncertain as an assumption or option rather than stating it as fact.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Plan<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 14px\">MODE = PLAN. Convert the user's prompt into a practical, ordered execution plan — plan the work, do NOT perform it. Use sections such as Objective, Assumptions, Scope, Steps, Dependencies, Risks / Mitigations, Validation, and Deliverables, expressing ordered steps as numbered items. Keep each step concrete enough that another person or assistant could follow it, and use inline options for decisions the user must still make (scope, owners, timeline, definition of done).<\u002Fpre>\n\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">7.4 Prompt Wizard — step system prompts<\u002Fh3>\n  <p style=\"margin:0 0 6px\"><strong>Generate Structure<\u002Fstrong> (Step 1; STRUCTURE and PERSONA instructions are appended after it)<\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">You are an expert prompt architect. Analyze the user's initial input — a rough idea or draft prompt — and propose the SECTION STRUCTURE of a well-organized, reusable prompt document. Do not write the content of any section.\n\nFollow the STRUCTURE and PERSONA instructions below when choosing and naming sections.\n\nOUTPUT FORMAT (STRICT):\nReturn ONLY markdown in this exact pattern:\n- \"## Section Name\" for top-level sections (4-8 of them), each followed on the next line by a single one-sentence description of what that section covers\n- \"### Subsection Name\" beneath a section, only when it genuinely needs subdivision (0-4 each), each also followed by its one-line description\nNo document title, no bullets, no commentary, no code fences.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Section Content<\u002Fstrong> (shared by all section steps; PERSONA appended after it)<\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">You are an expert prompt engineer writing ONE section of a larger prompt document. Write only the requested section — never other sections, and no commentary.\n\nFollow the PERSONA instruction below. Be specific and actionable; cut filler and generic advice. Never invent facts — prefer explicit assumptions and inline options over pretending unknown details are known.\n\nOUTPUT FORMAT (STRICT):\n- Start with the section's \"## Heading\" exactly as given, and cover its \"### Subheadings\" where provided.\n- Use \"- \" bullets or \"1. \" numbered steps for enumerable content.\n- Turn variable or decision-like values into inline options using exactly this syntax: [option name](ph:choice 1|choice 2|choice 3) — the FIRST choice is the default; give 2-5 distinct, realistic choices, placed inline where the value belongs.\nReturn ONLY the section's markdown. No code fence around it.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Section user message template<\u002Fstrong> (built automatically per generation)<\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 14px\">ORIGINAL INPUT / IDEA:\n(your initial input)\n\nFULL PROMPT OUTLINE (context only — do not write other sections):\n(all included sections + descriptions)\n\nWRITE ONLY THIS SECTION:\n(this section's heading, description, subsections)\n\nLENGTH / DEPTH: (length instruction, §7.5)\n\nEXTRA INSTRUCTIONS / CONTEXT:            ← only if provided\n(your extra instructions)\n\nPREVIOUS VERSION OF THIS SECTION:        ← only when regenerating with feedback\n(previous content)\n\nFEEDBACK — REVISE THE SECTION ACCORDINGLY:\n(your feedback)<\u002Fpre>\n\n  <h3 style=\"font-family:system-ui,sans-serif;font-size:15.5px;margin:14px 0 6px\">7.5 Wizard length / depth instructions<\u002Fh3>\n  <ul style=\"margin:0 0 14px;padding-left:22px\">\n    <li style=\"margin-bottom:4px\"><strong>Concise<\u002Fstrong> — \"a few tight bullets per heading; only what is essential.\"<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>Standard<\u002Fstrong> — \"cover the section fully but without exhaustive detail.\"<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>Detailed<\u002Fstrong> — \"thorough coverage: edge cases, assumptions, and inline options for open decisions.\"<\u002Fli>\n  <\u002Ful>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:26px 0 8px;color:#0F766E\">8 · Built-in personas<\u002Fh2>\n  <p style=\"margin:0 0 8px\">Shared by Wizard and Enrich; fully editable, and you can add your own. When \"None\" is selected, this fallback line is sent instead: <em>\"No specific persona — use a neutral, knowledgeable perspective.\"<\u002Fem><\u002Fp>\n  <p style=\"margin:0 0 6px\"><strong>Product Manager<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">Adopt the perspective of an experienced product manager. Prioritize user value, clear problem framing, target users, scope and prioritization, success metrics, and explicit tradeoffs. Surface assumptions and open questions, and frame sections around outcomes rather than implementation.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Senior Software Engineer<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">Adopt the perspective of a senior software engineer. Emphasize architecture, components and interfaces, data flow, constraints, edge cases, failure modes, testing, and maintainability. Treat unspecified technical decisions as options rather than assuming them.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Technical Writer<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">Adopt the perspective of a technical writer. Optimize for the reader: clarity, the right audience level, logical structure, consistent terminology, and documentation that is complete yet concise. Prefer precise, unambiguous wording.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>UX Designer<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">Adopt the perspective of a UX designer. Focus on user goals, primary flows and edge cases, information architecture, interaction and state design, accessibility, and usability criteria. Frame sections around the user journey.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Data Scientist<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 14px\">Adopt the perspective of a data scientist. Emphasize the question, available data and its limitations, assumptions, metrics and baselines, methodology, and validation, and be explicit about how results should be interpreted. Avoid asserting findings the data cannot support.<\u002Fpre>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:26px 0 8px;color:#0F766E\">9 · Built-in structures<\u002Fh2>\n  <p style=\"margin:0 0 8px\">Also shared by Wizard and Enrich, editable and extensible.<\u002Fp>\n  <p style=\"margin:0 0 6px\"><strong>Standard · Role / Rules / Context / Input / Output<\u002Fstrong> (the default)<\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">Structure the output around these sections where relevant:\n- Role: who the target model should act as and the expertise it should bring\n- Rules: constraints, priorities, boundaries, and required behaviors\n- Context: background, domain facts, assumptions, references\n- Input: what the future user will supply, with inline options for variable values\n- Output: the expected deliverable's format, depth, tone, and success criteria\n\nKeep sections self-contained and independently useful. Express enumerable content as individual bullets rather than dense paragraphs.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Minimal · loose<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">Keep the structure loose and light. Include only the sections that are clearly needed, chosen from:\n- Goal\n- Context\n- Instructions\n- Output Format\n\nPrefer brevity and direct usefulness; do not add sections just to fill a template.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Spec-driven · strict<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">Structure the output as a precise specification with these sections:\n- Objective\n- Users / Stakeholders\n- Functional Requirements\n- Nonfunctional Requirements\n- Constraints\n- Acceptance Criteria\n- Open Questions\n\nExpress each requirement and criterion as its own bullet so it can be reviewed independently. Capture unknowns under Open Questions instead of inventing answers.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Execution Plan<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 10px\">Structure the output as an execution plan with these sections:\n- Objective\n- Assumptions\n- Scope\n- Steps\n- Dependencies\n- Risks / Mitigations\n- Validation\n- Deliverables\n\nNumber the steps. Keep each step concrete enough for someone else to follow without extra context.<\u002Fpre>\n  <p style=\"margin:0 0 6px\"><strong>Research Brief<\u002Fstrong><\u002Fp>\n  <pre style=\"background:#f0ede7;border:1px solid #e7e3dc;border-radius:8px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;margin:0 0 14px\">Structure the output as a research brief with these sections:\n- Research Question\n- Background\n- Scope and Exclusions\n- Source Requirements\n- Methodology\n- Deliverables\n\nRequire sources and uncertainty to be stated rather than asserting unverified claims.<\u002Fpre>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:26px 0 8px;color:#0F766E\">10 · Managing personas &amp; structures<\u002Fh2>\n  <ul style=\"margin:0 0 10px;padding-left:22px\">\n    <li style=\"margin-bottom:4px\"><strong>＋ Add / Rename / Delete<\u002Fstrong> — one shared library used across the Wizard and Enrich tabs; renames propagate everywhere (including per-section persona picks). \"None\" (persona) can't be renamed or deleted; at least one structure must remain.<\u002Fli>\n    <li style=\"margin-bottom:4px\"><strong>Editing the instruction text<\u002Fstrong> creates a local override for that tab — a <strong>Save<\u002Fstrong> button writes it back as the library default; <strong>Reset<\u002Fstrong> discards the override.<\u002Fli>\n    <li style=\"margin-bottom:4px\">The Detect Options, Enrich, and both Wizard step system prompts each have their own <strong>Reset to default<\u002Fstrong>.<\u002Fli>\n  <\u002Ful>\n\n  <h2 style=\"font-family:system-ui,sans-serif;font-size:20px;margin:26px 0 8px;color:#0F766E\">11 · A typical workflow<\u002Fh2>\n  <ol style=\"margin:0 0 10px;padding-left:22px\">\n    <li style=\"margin-bottom:5px\">Set up your provider + API key once in <strong>AI Settings<\u002Fstrong>.<\u002Fli>\n    <li style=\"margin-bottom:5px\">Start in <strong>Enrich Prompt<\u002Fstrong> (fast) or <strong>Prompt Wizard<\u002Fstrong> (controlled, section by section) to turn an idea into a structured, option-templated prompt.<\u002Fli>\n    <li style=\"margin-bottom:5px\">In the <strong>Markdown Viewer<\u002Fstrong>, pick option values, uncheck blocks/rows/columns you don't need, and run <strong>✦ Detect Options<\u002Fstrong> if more knobs would help.<\u002Fli>\n    <li style=\"margin-bottom:5px\"><strong>💾 Save<\u002Fstrong> it to the library for reuse; <strong>⧉ Copy Selected<\u002Fstrong> to paste the configured prompt into any LLM.<\u002Fli>\n  <\u002Fol>\n\n<\u002Fdiv>\n<\u002Fx-import>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
